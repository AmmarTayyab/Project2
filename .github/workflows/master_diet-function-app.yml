name: Deploy Backend to Azure Function

on:
  push:
    branches:
      - main  # or your branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: |
          cd backend  # make sure this points to your backend folder
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Archive the backend folder
      - name: Archive Backend
        run: zip -r backend.zip backend/*

      # Deploy to Azure Function
      - name: Deploy to Azure Function
        uses: azure/functions-action@v1
        with:
          app-name: 'diet-function-app'  # your Function App name
          package: './backend'            # path to backend folder
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          
